<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sequence Memory — Light Trace (Game 2)</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Comic+Neue:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg1: linear-gradient(135deg, #AEE6FF, #B8F2E6);
        --bg2: linear-gradient(135deg, #FFD6E0, #FFF4A3);
        --accent1: #E4C1F9;
        --accent2: #B8F2E6;
        --muted: #2c2c2c;
        --card-w: 100px;
        --gutter: 12px;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: 'Comic Neue', cursive;
        -webkit-font-smoothing: antialiased;
        background: linear-gradient(180deg, #FFE5B4, #C9DFDE);
        color: #2c2c2c;
      }
      .app {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        padding: 20px;
      }

      /* Header */
      .header {
        width: 100%;
        max-width: 980px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .brand {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .logo {
        width: 56px;
        height: 56px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, var(--accent1), var(--accent2));
        font-family: "Fredoka One";
        color: #fff;
      }
      .title {
        font-family: "Fredoka One";
        font-size: 18px;
        color: #FF6B9D;
        font-weight: bold;
      }
      .subtitle {
        font-size: 13px;
        color: var(--muted);
      }

      .btn {
        padding: 8px 14px;
        border-radius: 15px;
        border: 0;
        cursor: pointer;
        font-weight: 700;
        font-family: 'Comic Neue', cursive;
      }
      .btn.primary {
        background: linear-gradient(90deg, var(--accent2), var(--accent1));
        color: #fff;
      }
      .btn.ghost {
        background: transparent;
        color: var(--muted);
        border: 1px solid rgba(0, 0, 0, 0.2);
      }

      /* Board */
      .board-wrap {
        width: 100%;
        max-width: 980px;
        padding: 18px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.8);
        border: 3px solid rgba(255, 107, 157, 0.3);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        display: flex;
        flex-direction: column;
        gap: 14px;
        align-items: center;
      }

      /* HUD */
      .hud {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .stat {
        padding: 8px 14px;
        border-radius: 12px;
        border: 2px solid #FF6B9D;
        background: rgba(255, 107, 157, 0.1);
        color: #2c2c2c;
        font-weight: 700;
        font-family: 'Comic Neue', cursive;
      }
      .stat strong {
        color: #FF6B9D;
        margin-left: 6px;
      }

      /* Tiles */
      .gridWrap {
        width: 100%;
        display: flex;
        justify-content: center;
      }
      .grid {
        display: grid;
        gap: var(--gutter);
        width: 100%;
        height: auto;
        max-width: 720px;
      }

      /* Tiles auto-scale */
      .tile {
        aspect-ratio: 1;
        width: 100%;
        max-width: 240px;
        border-radius: 20px;
        background: linear-gradient(135deg, #FFB6D9, #B6E5FF);
        font-size: 28px;
        font-weight: 800;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        transition: transform 0.2s;
        user-select: none;
        cursor: pointer;
        border: 3px solid rgba(255, 255, 255, 0.6);
      }

      .tile:nth-child(1) { background: linear-gradient(135deg, #FFB6D9, #FFC0CB); }
      .tile:nth-child(2) { background: linear-gradient(135deg, #B6E5FF, #ADD8E6); }
      .tile:nth-child(3) { background: linear-gradient(135deg, #FFD9B6, #FFDAB9); }
      .tile:nth-child(4) { background: linear-gradient(135deg, #C9E4DE, #AFEEEE); }

      .tile.glow {
        transform: scale(1.08);
        box-shadow: 0 0 30px rgba(255, 107, 157, 0.6);
      }
      .grid.blocked .tile {
        pointer-events: none;
        opacity: 0.8;
      }

      /* Countdown */
      #countdownOverlay {
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0.95);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: "Fredoka One";
        font-size: 70px;
        color: #FF6B9D;
        z-index: 100;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
        font-weight: bold;
      }
      .countText {
        font-size: 20px;
        color: #2c2c2c;
        margin-bottom: 10px;
        font-family: 'Comic Neue', cursive;
      }

      /* Win overlay */
      .winOverlay {
        position: absolute;
        inset: 0;
        background: rgba(255, 255, 255, 0.98);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: #FF6B9D;
        font-family: "Fredoka One";
        font-size: 30px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
        font-weight: bold;
      }
      .winOverlay.show {
        opacity: 1;
        pointer-events: auto;
      }
    </style>
  </head>

  <body>
    <div class="app">
      <div class="header">
        <div class="brand">
          <div class="logo">SQ</div>
          <div>
            <div class="title">Sequence Memory — Light Trace</div>
            <div class="subtitle">Follow the flashing pattern</div>
          </div>
        </div>

        <button id="startBtn" class="btn primary">Start</button>
      </div>

      <div class="board-wrap">
        <div class="hud">
          <div class="stat">Level: <strong id="levelText">1</strong></div>
          <div class="stat">Time: <strong id="timer">00:00</strong></div>
          <div class="stat">Mistakes: <strong id="mistakes">0</strong></div>
          <div class="stat">
            Status: <strong id="statusBadge">Ready</strong>
          </div>
        </div>

        <div class="gridWrap">
          <div id="grid" class="grid"></div>
        </div>

        <div id="countdownOverlay">
          <div class="countText">Starting In</div>
          <div id="countNumber">3</div>
        </div>

        <div id="winOverlay" class="winOverlay">
          <div id="winText">Level Complete!</div>
          <button id="nextBtn" class="btn primary" style="margin-top: 14px">
            Next
          </button>
        </div>
      </div>
    </div>

    <script>
      /* ==========================================================
   SEQUENCE MEMORY — 3 LEVELS — SINGLE ROUND EACH
   Auto-flow: L1 → L2 → L3 → Done
   Auto-save logs:
       game_sequencememory_level_0
       game_sequencememory_level_1
       game_sequencememory_level_2
   Ordered result list: memory_sequence
========================================================== */
      function saveToSequenceMemory(log) {
        let arr = JSON.parse(localStorage.getItem("sequence_memory") || "[]");
        arr.push(log);
        localStorage.setItem("sequence_memory", JSON.stringify(arr));
      }

      (() => {
        const LEVELS = [
          { rows: 2, cols: 2, seq: 3 }, // Level 1 → 3 tiles
          { rows: 2, cols: 3, seq: 4 }, // Level 2 → 4 tiles
          { rows: 2, cols: 3, seq: 5 }, // Level 3 → 5 tiles
        ];

        let level = 0;

        const gridEl = document.getElementById("grid");
        const startBtn = document.getElementById("startBtn");
        const levelText = document.getElementById("levelText");
        const statusBadge = document.getElementById("statusBadge");
        const timerEl = document.getElementById("timer");
        const mistakesEl = document.getElementById("mistakes");
        const countdownOverlay = document.getElementById("countdownOverlay");
        const countNumber = document.getElementById("countNumber");
        const winOverlay = document.getElementById("winOverlay");
        const nextBtn = document.getElementById("nextBtn");

        let tiles = [];
        let sequence = [];
        let index = 0;
        let mistakes = 0;
        let startTime = 0;
        let timerInt = null;

        let log = null;

        function fmt(t) {
          const s = Math.floor(t / 1000);
          return `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(
            s % 60
          ).padStart(2, "0")}`;
        }

        function buildGrid() {
          const cfg = LEVELS[level];
          gridEl.style.gridTemplateRows = `repeat(${cfg.rows},1fr)`;
          gridEl.style.gridTemplateColumns = `repeat(${cfg.cols},1fr)`;
          gridEl.innerHTML = "";
          tiles = [];

          const count = cfg.rows * cfg.cols;
          for (let i = 0; i < count; i++) {
            const t = document.createElement("div");
            t.className = "tile";
            t.textContent = i + 1;
            t.dataset.index = i;
            t.onclick = onTileTap;
            gridEl.appendChild(t);
            tiles.push(t);
          }
        }

        function generateSequence() {
          const len = LEVELS[level].seq;
          sequence = [];
          for (let i = 0; i < len; i++) {
            sequence.push(Math.floor(Math.random() * tiles.length));
          }
        }

        function flash(i) {
          const t = tiles[i];
          t.classList.add("glow");
          setTimeout(() => t.classList.remove("glow"), 300);
        }

        async function playSequence() {
          gridEl.classList.add("blocked");
          statusBadge.textContent = "Watch";
          await new Promise((r) => setTimeout(r, 400));

          for (let i = 0; i < sequence.length; i++) {
            flash(sequence[i]);
            log.raw.push({
              time: Date.now() - startTime,
              event: "flash",
              value: sequence[i],
            });
            await new Promise((r) => setTimeout(r, 600));
          }

          gridEl.classList.remove("blocked");
          statusBadge.textContent = "Your Turn";
        }

        function onTileTap(e) {
          const idx = Number(e.currentTarget.dataset.index);
          const now = Date.now();
          log.raw.push({ time: now - startTime, event: "tap", value: idx });

          flash(idx);

          if (idx === sequence[index]) {
            index++;
            if (index === sequence.length) {
              clearInterval(timerInt);
              log.end = new Date().toISOString();
              log.duration = now - startTime;
              log.mistakes = mistakes;
              log.success = 1;

              // Save
              saveToSequenceMemory(log);

              winOverlay.classList.add("show");
              statusBadge.textContent = "Completed";
            }
          } else {
            mistakes++;
            mistakesEl.textContent = mistakes;
            log.raw.push({
              time: now - startTime,
              event: "mistake",
              value: { expected: sequence[index], got: idx },
            });
          }
        }

        async function startLevel() {
          buildGrid();
          levelText.textContent = level + 1;
          mistakes = 0;
          mistakesEl.textContent = "0";
          statusBadge.textContent = "Ready";
          index = 0;

          log = {
            game: "SequenceMemory",
            level: level + 1,
            start: null,
            end: null,
            duration: 0,
            mistakes: 0,
            success: 0,
            sequence: [],
            raw: [],
          };

          await countdown();
          startTime = Date.now();
          log.start = new Date(startTime).toISOString();

          timerInt = setInterval(() => {
            timerEl.textContent = fmt(Date.now() - startTime);
          }, 250);

          generateSequence();
          log.sequence = sequence.slice();

          await playSequence();
        }

        function countdown() {
          return new Promise((res) => {
            countdownOverlay.style.opacity = 1;
            const seq = ["3", "2", "1", "GO!"];
            let i = 0;

            countNumber.textContent = seq[i];

            const t = setInterval(() => {
              i++;
              if (i < seq.length) {
                countNumber.textContent = seq[i];
              } else {
                clearInterval(t);
                setTimeout(() => {
                  countdownOverlay.style.opacity = 0;
                  res();
                }, 300);
              }
            }, 700);
          });
        }

        nextBtn.onclick = () => {
          winOverlay.classList.remove("show");
          level++;
          if (level >= LEVELS.length) {
            statusBadge.textContent = "All Levels Done!";
            window.location.href = "home_page.html";
          }
          startLevel();
        };

        startBtn.onclick = () => {
          level = 0;
          startLevel();
        };

        buildGrid();
      })();
    </script>
  </body>
</html>
